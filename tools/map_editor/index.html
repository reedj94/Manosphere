<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manosphere — Map Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}

#sidebar{width:300px;background:#16213e;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;border-right:1px solid #0f3460}
#sidebar h2{font-size:14px;color:#7ec8e3;text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px}
.palette-item{padding:8px 10px;background:#0f3460;border:1px solid #1a1a4e;border-radius:4px;cursor:grab;font-size:13px;display:flex;align-items:center;gap:8px}
.palette-item:hover{background:#1a3a6e;border-color:#7ec8e3}
.palette-swatch{width:16px;height:16px;border-radius:2px;flex-shrink:0}

#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#0a0a1a}
canvas{display:block}

#props-panel{width:320px;background:#16213e;padding:12px;overflow-y:auto;border-left:1px solid #0f3460;display:none;flex-direction:column;gap:6px}
#props-panel.active{display:flex}
#props-panel h2{font-size:14px;color:#7ec8e3;text-transform:uppercase;letter-spacing:1px;margin:4px 0}
#props-panel label{font-size:12px;color:#a0a0b0;display:block;margin-top:4px}
#props-panel input,#props-panel select,#props-panel textarea{width:100%;padding:6px 8px;background:#0f3460;border:1px solid #1a1a4e;color:#e0e0e0;border-radius:3px;font-size:13px;font-family:inherit}
#props-panel textarea{resize:vertical;min-height:50px}
#props-panel input:focus,#props-panel select:focus{border-color:#7ec8e3;outline:none}

#toolbar{position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:10}
#toolbar button{padding:6px 14px;background:#0f3460;border:1px solid #1a1a4e;color:#e0e0e0;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
#toolbar button:hover{background:#1a3a6e;border-color:#7ec8e3}
#toolbar button.danger{border-color:#e74c3c}
#toolbar button.danger:hover{background:#c0392b}

#status{position:absolute;bottom:10px;left:10px;font-size:11px;color:#606080;z-index:10}
#region-select{position:absolute;top:10px;right:340px;z-index:10}
#region-select select{padding:6px 10px;background:#0f3460;border:1px solid #1a1a4e;color:#e0e0e0;border-radius:4px;font-size:13px}
</style>
</head>
<body>

<div id="sidebar">
  <h2>POI Palette</h2>
  <div class="palette-item" draggable="true" data-type="SAFEHOUSE" data-color="#59473a" data-w="8" data-h="6" data-d="10">
    <div class="palette-swatch" style="background:#59473a"></div>Safehouse (Man Cave)
  </div>
  <div class="palette-item" draggable="true" data-type="RECRUITMENT_SHOP" data-color="#857a6b" data-w="7" data-h="8" data-d="9">
    <div class="palette-swatch" style="background:#857a6b"></div>Recruitment Shop
  </div>
  <div class="palette-item" draggable="true" data-type="SHOP" data-color="#73807a" data-w="7" data-h="7" data-d="8">
    <div class="palette-swatch" style="background:#73807a"></div>Shop
  </div>
  <div class="palette-item" draggable="true" data-type="BOOKIES" data-color="#4d734d" data-w="9" data-h="7" data-d="10">
    <div class="palette-swatch" style="background:#4d734d"></div>Bookies
  </div>
  <div class="palette-item" draggable="true" data-type="NIGHTCLUB" data-color="#261f33" data-w="14" data-h="9" data-d="12">
    <div class="palette-swatch" style="background:#261f33"></div>Nightclub
  </div>
  <div class="palette-item" draggable="true" data-type="PARK" data-color="#475938" data-w="18" data-h="2" data-d="16">
    <div class="palette-swatch" style="background:#475938"></div>Park
  </div>
  <div class="palette-item" draggable="true" data-type="VAPE_SHOP" data-color="#99d98c" data-w="6" data-h="8" data-d="8">
    <div class="palette-swatch" style="background:#99d98c"></div>Vape Shop (Faction)
  </div>
  <div class="palette-item" draggable="true" data-type="BARBERS" data-color="#8cbfe6" data-w="7" data-h="7" data-d="9">
    <div class="palette-swatch" style="background:#8cbfe6"></div>Barbers (Faction)
  </div>
  <div class="palette-item" draggable="true" data-type="FACTION_HQ" data-color="#d9bf4d" data-w="10" data-h="14" data-d="10">
    <div class="palette-swatch" style="background:#d9bf4d"></div>Faction HQ
  </div>

  <h2>Props</h2>
  <div class="palette-item" draggable="true" data-type="PROP_LAMP" data-color="#40404a" data-w="0.3" data-h="5" data-d="0.3">
    <div class="palette-swatch" style="background:#ffeab5"></div>Street Light
  </div>
  <div class="palette-item" draggable="true" data-type="PROP_BENCH" data-color="#664d33" data-w="1.8" data-h="0.5" data-d="0.6">
    <div class="palette-swatch" style="background:#664d33"></div>Bench
  </div>
  <div class="palette-item" draggable="true" data-type="PROP_BIN" data-color="#333338" data-w="0.4" data-h="0.7" data-d="0.4">
    <div class="palette-swatch" style="background:#333338"></div>Bin
  </div>
  <div class="palette-item" draggable="true" data-type="SPAWN" data-color="#00ff88" data-w="1" data-h="2" data-d="1">
    <div class="palette-swatch" style="background:#00ff88"></div>Player Spawn
  </div>
</div>

<div id="canvas-wrap">
  <div id="toolbar">
    <button onclick="exportJSON()">Export JSON</button>
    <button onclick="document.getElementById('import-file').click()">Import JSON</button>
    <button onclick="exportForGodot()">Export for Godot</button>
    <button class="danger" onclick="deleteSelected()">Delete Selected</button>
    <button onclick="duplicateSelected()">Duplicate</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
  <div id="region-select">
    <select id="region" onchange="switchRegion(this.value)">
      <option value="consett">Consett</option>
      <option value="london">London</option>
      <option value="miami">Miami</option>
      <option value="dubai">Dubai</option>
    </select>
  </div>
  <canvas id="canvas"></canvas>
  <div id="status">Scroll to zoom · Drag canvas to pan · Drag palette items to place · Click to select</div>
</div>

<div id="props-panel">
  <h2>Properties</h2>
  <label>ID</label><input id="p-id" onchange="updateProp('id',this.value)">
  <label>Display Name</label><input id="p-name" onchange="updateProp('display_name',this.value)">
  <label>Description</label><textarea id="p-desc" onchange="updateProp('description',this.value)"></textarea>
  <label>Type</label><input id="p-type" readonly>
  <label>Position X</label><input id="p-px" type="number" step="0.5" onchange="updateProp('px',+this.value)">
  <label>Position Z</label><input id="p-pz" type="number" step="0.5" onchange="updateProp('pz',+this.value)">
  <label>Width (X)</label><input id="p-w" type="number" step="0.5" min="1" onchange="updateProp('w',+this.value)">
  <label>Height (Y)</label><input id="p-h" type="number" step="0.5" min="1" onchange="updateProp('h',+this.value)">
  <label>Depth (Z)</label><input id="p-d" type="number" step="0.5" min="1" onchange="updateProp('d',+this.value)">
  <label>Colour</label><input id="p-color" type="color" onchange="updateProp('color',this.value)">
  <label>Faction ID</label><input id="p-faction" onchange="updateProp('faction_id',this.value)">
  <label>Open Hour</label><input id="p-open" type="number" min="0" max="23" onchange="updateProp('open_hour',+this.value)">
  <label>Close Hour</label><input id="p-close" type="number" min="0" max="24" onchange="updateProp('close_hour',+this.value)">
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const WORLD = 140;

let cam = { x: 0, y: 0, zoom: 4 };
let regions = { consett: [], london: [], miami: [], dubai: [] };
let currentRegion = 'consett';
let items = regions[currentRegion];
let selected = null;
let dragging = null;
let dragOffset = { x: 0, y: 0 };
let panning = false;
let panStart = { x: 0, y: 0 };
let idCounter = 1;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}
window.addEventListener('resize', resize);

function worldToScreen(wx, wz) {
  return {
    x: (wx - cam.x) * cam.zoom + canvas.width / 2,
    y: (wz - cam.y) * cam.zoom + canvas.height / 2
  };
}
function screenToWorld(sx, sy) {
  return {
    x: (sx - canvas.width / 2) / cam.zoom + cam.x,
    z: (sy - canvas.height / 2) / cam.zoom + cam.y
  };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return [r, g, b];
}
function rgbToHex(r, g, b) {
  const to = v => Math.round(v * 255).toString(16).padStart(2, '0');
  return '#' + to(r) + to(g) + to(b);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground plane
  const tl = worldToScreen(-WORLD / 2, -WORLD / 2);
  const br = worldToScreen(WORLD / 2, WORLD / 2);
  ctx.fillStyle = '#1a1c20';
  ctx.fillRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);

  // Grid
  ctx.strokeStyle = '#252830';
  ctx.lineWidth = 1;
  const gridStep = 10;
  for (let g = -WORLD / 2; g <= WORLD / 2; g += gridStep) {
    const a = worldToScreen(g, -WORLD / 2);
    const b = worldToScreen(g, WORLD / 2);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    const c = worldToScreen(-WORLD / 2, g);
    const d = worldToScreen(WORLD / 2, g);
    ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(d.x, d.y); ctx.stroke();
  }

  // Origin cross
  const o = worldToScreen(0, 0);
  ctx.strokeStyle = '#404060';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(o.x - 10, o.y); ctx.lineTo(o.x + 10, o.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(o.x, o.y - 10); ctx.lineTo(o.x, o.y + 10); ctx.stroke();

  // Items
  for (const item of items) {
    const pos = worldToScreen(item.px - item.w / 2, item.pz - item.d / 2);
    const sz = { x: item.w * cam.zoom, y: item.d * cam.zoom };

    ctx.fillStyle = item.color;
    ctx.globalAlpha = item === selected ? 0.9 : 0.7;
    ctx.fillRect(pos.x, pos.y, sz.x, sz.y);
    ctx.globalAlpha = 1;

    // Outline
    ctx.strokeStyle = item === selected ? '#00ff88' : '#ffffff30';
    ctx.lineWidth = item === selected ? 2 : 1;
    ctx.strokeRect(pos.x, pos.y, sz.x, sz.y);

    // Label
    const fontSize = Math.max(9, Math.min(13, cam.zoom * 2.5));
    ctx.font = `${fontSize}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = item.display_name || item.type;
    const maxW = sz.x - 4;
    if (maxW > 20) {
      ctx.fillText(label, pos.x + sz.x / 2, pos.y + sz.y / 2, maxW);
    }

    // Type badge
    if (item.type.startsWith('PROP_') || item.type === 'SPAWN') {
      ctx.fillStyle = item.type === 'SPAWN' ? '#00ff88' : '#ffeab5';
      ctx.beginPath();
      ctx.arc(pos.x + sz.x / 2, pos.y + sz.y / 2, Math.max(3, cam.zoom * 0.4), 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function hitTest(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (w.x >= it.px - it.w / 2 && w.x <= it.px + it.w / 2 &&
        w.z >= it.pz - it.d / 2 && w.z <= it.pz + it.d / 2) {
      return it;
    }
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    panning = true;
    panStart = { x: e.clientX, y: e.clientY };
    canvas.style.cursor = 'grabbing';
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const hit = hitTest(e.clientX - rect.left, e.clientY - rect.top);
  if (hit) {
    selected = hit;
    dragging = hit;
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    dragOffset = { x: w.x - hit.px, y: w.z - hit.pz };
    showProps(hit);
  } else {
    selected = null;
    document.getElementById('props-panel').classList.remove('active');
    panning = true;
    panStart = { x: e.clientX, y: e.clientY };
    canvas.style.cursor = 'grabbing';
  }
  draw();
});

canvas.addEventListener('mousemove', e => {
  if (panning) {
    cam.x -= (e.clientX - panStart.x) / cam.zoom;
    cam.y -= (e.clientY - panStart.y) / cam.zoom;
    panStart = { x: e.clientX, y: e.clientY };
    draw();
    return;
  }
  if (dragging) {
    const rect = canvas.getBoundingClientRect();
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    dragging.px = Math.round((w.x - dragOffset.x) * 2) / 2;
    dragging.pz = Math.round((w.z - dragOffset.y) * 2) / 2;
    if (selected === dragging) {
      document.getElementById('p-px').value = dragging.px;
      document.getElementById('p-pz').value = dragging.pz;
    }
    draw();
  }
});

canvas.addEventListener('mouseup', () => {
  dragging = null;
  panning = false;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  cam.zoom = Math.max(0.5, Math.min(30, cam.zoom * factor));
  draw();
}, { passive: false });

// Drag from palette
document.querySelectorAll('.palette-item').forEach(el => {
  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', JSON.stringify({
      type: el.dataset.type,
      color: el.dataset.color,
      w: +el.dataset.w,
      h: +el.dataset.h,
      d: +el.dataset.d
    }));
  });
});

canvas.addEventListener('dragover', e => e.preventDefault());
canvas.addEventListener('drop', e => {
  e.preventDefault();
  const data = JSON.parse(e.dataTransfer.getData('text/plain'));
  const rect = canvas.getBoundingClientRect();
  const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);

  const item = {
    id: currentRegion + '_' + data.type.toLowerCase() + '_' + (idCounter++),
    type: data.type,
    display_name: data.type === 'SPAWN' ? 'Player Spawn' : '',
    description: '',
    px: Math.round(w.x * 2) / 2,
    pz: Math.round(w.z * 2) / 2,
    w: data.w,
    h: data.h,
    d: data.d,
    color: data.color,
    faction_id: '',
    open_hour: 0,
    close_hour: 24
  };
  items.push(item);
  selected = item;
  showProps(item);
  draw();
});

function showProps(item) {
  const p = document.getElementById('props-panel');
  p.classList.add('active');
  document.getElementById('p-id').value = item.id;
  document.getElementById('p-name').value = item.display_name;
  document.getElementById('p-desc').value = item.description;
  document.getElementById('p-type').value = item.type;
  document.getElementById('p-px').value = item.px;
  document.getElementById('p-pz').value = item.pz;
  document.getElementById('p-w').value = item.w;
  document.getElementById('p-h').value = item.h;
  document.getElementById('p-d').value = item.d;
  document.getElementById('p-color').value = item.color;
  document.getElementById('p-faction').value = item.faction_id;
  document.getElementById('p-open').value = item.open_hour;
  document.getElementById('p-close').value = item.close_hour;
}

function updateProp(key, val) {
  if (!selected) return;
  if (key === 'px') selected.px = val;
  else if (key === 'pz') selected.pz = val;
  else if (key === 'w') selected.w = val;
  else if (key === 'h') selected.h = val;
  else if (key === 'd') selected.d = val;
  else if (key === 'color') selected.color = val;
  else if (key === 'open_hour') selected.open_hour = val;
  else if (key === 'close_hour') selected.close_hour = val;
  else selected[key] = val;
  draw();
}

function deleteSelected() {
  if (!selected) return;
  items.splice(items.indexOf(selected), 1);
  selected = null;
  document.getElementById('props-panel').classList.remove('active');
  draw();
}

function duplicateSelected() {
  if (!selected) return;
  const dup = JSON.parse(JSON.stringify(selected));
  dup.id = dup.id + '_copy';
  dup.px += 3;
  dup.pz += 3;
  items.push(dup);
  selected = dup;
  showProps(dup);
  draw();
}

function switchRegion(r) {
  currentRegion = r;
  items = regions[r];
  selected = null;
  document.getElementById('props-panel').classList.remove('active');
  draw();
}

function toExportFormat() {
  const allRegions = {};
  for (const [region, regionItems] of Object.entries(regions)) {
    const pois = [];
    const props = [];
    let spawn = null;
    for (const it of regionItems) {
      if (it.type === 'SPAWN') {
        spawn = { x: it.px, z: it.pz };
      } else if (it.type.startsWith('PROP_')) {
        props.push({
          type: it.type,
          position: [it.px, 0, it.pz],
        });
      } else {
        const rgb = hexToRgb(it.color);
        const poi = {
          id: it.id,
          type: it.type,
          display_name: it.display_name,
          description: it.description,
          position: [it.px, 0, it.pz],
          size: [it.w, it.h, it.d],
          colour: [+rgb[0].toFixed(3), +rgb[1].toFixed(3), +rgb[2].toFixed(3)],
          open_hours: [it.open_hour, it.close_hour]
        };
        if (it.faction_id) poi.faction_id = it.faction_id;
        pois.push(poi);
      }
    }
    if (pois.length > 0 || props.length > 0 || spawn) {
      allRegions[region] = { pois, props, player_spawn: spawn };
    }
  }
  return allRegions;
}

function exportJSON() {
  const data = toExportFormat();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'map_layout.json';
  a.click();
}

function exportForGodot() {
  const data = toExportFormat();
  const blob = new Blob([JSON.stringify(data, null, '\t')], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'map_layout_godot.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      for (const [region, rd] of Object.entries(data)) {
        if (!regions[region]) regions[region] = [];
        const arr = [];
        if (rd.pois) {
          for (const poi of rd.pois) {
            arr.push({
              id: poi.id,
              type: poi.type,
              display_name: poi.display_name || '',
              description: poi.description || '',
              px: poi.position[0],
              pz: poi.position[2],
              w: poi.size[0],
              h: poi.size[1],
              d: poi.size[2],
              color: rgbToHex(poi.colour[0], poi.colour[1], poi.colour[2]),
              faction_id: poi.faction_id || '',
              open_hour: poi.open_hours ? poi.open_hours[0] : 0,
              close_hour: poi.open_hours ? poi.open_hours[1] : 24,
            });
          }
        }
        if (rd.props) {
          for (const p of rd.props) {
            arr.push({
              id: region + '_' + p.type.toLowerCase() + '_' + (idCounter++),
              type: p.type,
              display_name: '',
              description: '',
              px: p.position[0],
              pz: p.position[2],
              w: p.type === 'PROP_LAMP' ? 0.3 : p.type === 'PROP_BENCH' ? 1.8 : 0.4,
              h: 1, d: 1,
              color: '#404040',
              faction_id: '',
              open_hour: 0, close_hour: 24
            });
          }
        }
        if (rd.player_spawn) {
          arr.push({
            id: region + '_spawn',
            type: 'SPAWN',
            display_name: 'Player Spawn',
            description: '',
            px: rd.player_spawn.x,
            pz: rd.player_spawn.z,
            w: 1, h: 2, d: 1,
            color: '#00ff88',
            faction_id: '',
            open_hour: 0, close_hour: 24
          });
        }
        regions[region] = arr;
      }
      items = regions[currentRegion];
      selected = null;
      draw();
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === 'd' && e.ctrlKey) { e.preventDefault(); duplicateSelected(); }
});

resize();
</script>
</body>
</html>
